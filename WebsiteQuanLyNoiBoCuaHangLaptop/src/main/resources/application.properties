# Port chạy website (Tomcat)
server.port=8080

# Cấu hình kết nối MySQL XAMPP (Port 3306)
# Đảm bảo hiển thị đúng Tiếng Việt với useUnicode=true&characterEncoding=UTF-8
spring.datasource.url=jdbc:mysql://localhost:3306/QuanLyKhoLaptop?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình Hibernate JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Tắt cache Thymeleaf để HTML/CSS nhận ngay lập tức khi F5 trình duyệt
spring.thymeleaf.cache=false

# Ép Spring Boot sử dụng chính xác tên bảng và cột như trong Entity (Không tự động đổi sang snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl