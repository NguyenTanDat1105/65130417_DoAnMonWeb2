<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý nhân viên - TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<div class="container py-5">
    <div class="card shadow border-0 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <a href="/dashboard" class="btn btn-outline-secondary btn-sm mb-2"><i class="fa-solid fa-arrow-left"></i> Về Dashboard</a>
                <h2 class="text-dark fw-bold mb-0"><i class="fa-solid fa-users me-2 text-warning"></i>Danh sách tài khoản nội bộ</h2>
            </div>
            <a href="/nhan-vien/them" class="btn btn-warning fw-bold text-dark shadow-sm">
                <i class="fa-solid fa-user-plus me-2"></i>Thêm nhân viên mới
            </a>
        </div>
        <hr>

        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle bg-white shadow-sm">
                <thead class="table-dark text-center">
                    <tr>
                        <th style="width: 80px;">Mã TK</th>
                        <th>Họ và tên</th>
                        <th>Số điện thoại</th> <th>Email đăng nhập</th>
                        <th>Mật khẩu</th>
                        <th style="width: 150px;">Chức vụ / Vai trò</th>
                        <th style="width: 180px;">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tk : ${dsTaiKhoan}">
                        <td class="text-center fw-bold" th:text="${tk.maTaiKhoan}">1</td>
                        <td class="fw-bold text-primary" th:text="${tk.hoTen}">Nguyễn Văn A</td>
                        <td class="fw-bold text-success" th:text="${tk.soDienThoai}">0912345678</td> <td th:text="${tk.email}">nva@gmail.com</td>
                        <td class="text-muted" th:text="${tk.matKhau}">******</td>
                        <td class="text-center">
                            <span th:classappend="${tk.vaiTro == 'Quản trị viên' ? 'badge bg-danger' : 'badge bg-info text-dark'}" 
                                  th:text="${tk.vaiTro}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/nhan-vien/sua/{id}(id=${tk.maTaiKhoan})}" class="btn btn-sm btn-outline-warning text-dark me-1">
                                <i class="fa-solid fa-user-pen"></i> Sửa
                            </a>
                            <a th:href="@{/nhan-vien/xoa/{id}(id=${tk.maTaiKhoan})}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa tài khoản này không?')">
                                <i class="fa-solid fa-user-xmark"></i> Xóa
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
