<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm mới - TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0 p-4">
                <div class="d-flex align-items-center mb-4">
                    <a href="/san-pham" class="btn btn-outline-secondary me-3"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
                    <h2 class="fw-bold text-primary mb-0">Thêm sản phẩm Laptop mới</h2>
                </div>
                <hr>
                
                <form th:action="@{/san-pham/luu}" th:object="${sanPham}" method="POST">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Tên sản phẩm Laptop</label>
                            <input type="text" th:field="*{tenSanPham}" class="form-dash form-control" required placeholder="Ví dụ: Asus ROG Strix G15">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Thương hiệu / Hãng</label>
                            <select th:field="*{thuongHieu.maThuongHieu}" class="form-select" required>
                                <option value="" disabled selected>-- Chọn hãng sản xuất --</option>
                                <option th:each="th : ${dsThuongHieu}" th:value="${th.maThuongHieu}" th:text="${th.tenThuongHieu}"></option>
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Phân loại danh mục</label>
                            <select th:field="*{danhMuc.maDanhMuc}" class="form-select" required>
                                <option value="" disabled selected>-- Chọn phân loại máy --</option>
                                <option th:each="dm : ${dsDanhMuc}" th:value="${dm.maDanhMuc}" th:text="${dm.tenDanhMuc}"></option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Bộ vi xử lý (CPU)</label>
                            <input type="text" th:field="*{cpu}" class="form-control" placeholder="Intel i5 13400H / Ryzen 7">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Bộ nhớ (RAM)</label>
                            <input type="text" th:field="*{ram}" class="form-control" placeholder="8GB DDR5 / 16GB">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Dung lượng ổ cứng</label>
                            <input type="text" th:field="*{oCung}" class="form-control" placeholder="SSD 512GB PCIe">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Card đồ họa (VGA)</label>
                            <input type="text" th:field="*{cardDoHoa}" class="form-control" placeholder="RTX 4060 / Intel Iris Xe">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Màn hình hiển thị</label>
                            <input type="text" th:field="*{manHinh}" class="form-control" placeholder="15.6 inch FHD 144Hz">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Giá bán ra (VNĐ)</label>
                            <input type="number" th:field="*{giaBan}" class="form-control" required placeholder="Nhập số tiền liền nhau, ví dụ: 15000000">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Số lượng nhập kho ban đầu</label>
                            <input type="number" th:field="*{soLuongTon}" class="form-control" required placeholder="Ví dụ: 10">
                        </div>
                    </div>
                    
                    <div class="mt-4 text-end">
                        <button type="reset" class="btn btn-light border fw-bold me-2">Xóa form nhập lại</button>
                        <button type="submit" class="btn btn-success fw-bold px-4"><i class="fa-solid fa-floppy-disk me-2"></i>Lưu sản phẩm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
