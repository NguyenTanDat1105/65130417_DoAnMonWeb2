<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border: none;
            border-radius: 10px;
        }
        /* CSS bổ sung để căn chỉnh icon mắt trong cấu trúc form-floating */
        .password-container {
            position: relative;
        }
        .password-container .form-control {
            padding-right: 45px; /* Tránh chữ bị đè lên icon */
        }
        .toggle-password-eye {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
            z-index: 10; /* Đảm bảo icon nằm trên cùng để click được */
            font-size: 1.1rem;
            transition: color 0.2s;
        }
        .toggle-password-eye:hover {
            color: #0d6efd; /* Đổi màu xanh khi di chuột vào */
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center py-4 rounded-top">
                    <h3 class="fw-bold mb-0"><i class="fa-solid fa-user-shield me-2"></i>ĐĂNG NHẬP</h3>
                    <small class="opacity-75">Hệ thống quản lý kho Laptop TechStore</small>
                </div>

                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/login}" method="post">
                        
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="emailInput" name="email" placeholder="name@example.com" required>
                            <label for="emailInput"><i class="fa-solid fa-envelope me-2"></i>Email đăng nhập</label>
                        </div>

                        <div class="form-floating mb-4 password-container">
                            <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Password" required>
                            <label for="passwordInput"><i class="fa-solid fa-lock me-2"></i>Mật khẩu</label>
                            <i class="fa-solid fa-eye toggle-password-eye" id="togglePassword"></i>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-lg fw-bold" type="submit">
                                <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng Nhập
                            </button>
                        </div>
                    </form>
                </div>
                
                <div class="card-footer text-center py-3 bg-light text-muted rounded-bottom">
                    <small>TechStore Laptop &copy; 2026</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#passwordInput');

    togglePassword.addEventListener('click', function () {
        // Kiểm tra loại thuộc tính hiện tại (password hay text)
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        // Thay đổi qua lại giữa icon mắt mở (fa-eye) và mắt gạch chéo (fa-eye-slash)
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>

</body>
</html>
