<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm tài khoản mới - TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 p-4">
                <div class="d-flex align-items-center mb-4">
                    <a href="/nhan-vien" class="btn btn-outline-secondary me-3"><i class="fa-solid fa-arrow-left"></i> Hủy</a>
                    <h3 class="fw-bold text-dark mb-0">Tạo tài khoản mới</h3>
                </div>
                <hr>
                <form th:action="@{/nhan-vien/luu}" th:object="${taiKhoan}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" th:field="*{hoTen}" class="form-control" required placeholder="Ví dụ: Trần Thị B">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số điện thoại liên hệ</label>
                        <input type="text" th:field="*{soDienThoai}" class="form-control" required placeholder="Ví dụ: 0987654321" pattern="[0-9]{10,11}" title="Vui lòng nhập số điện thoại hợp lệ (10-11 chữ số)">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email đăng nhập</label>
                        <input type="email" th:field="*{email}" class="form-control" required placeholder="name@gmail.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mật khẩu kích hoạt</label>
                        <input type="text" th:field="*{matKhau}" class="form-control" required placeholder="Nhập mật khẩu">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phân bổ Vai trò</label>
                        <select th:field="*{vaiTro}" class="form-select" required>
                            <option value="Nhân viên">Nhân viên</option>
                            <option value="Quản trị viên">Quản trị viên</option>
                        </select>
                    </div>
                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-success fw-bold w-100 py-2"><i class="fa-solid fa-floppy-disk me-2"></i>Lưu cấp tài khoản</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
