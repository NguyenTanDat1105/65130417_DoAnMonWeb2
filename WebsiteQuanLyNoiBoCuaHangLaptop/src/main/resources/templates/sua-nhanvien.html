<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa tài khoản - TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 p-4">
                <div class="d-flex align-items-center mb-4">
                    <a href="/nhan-vien" class="btn btn-outline-secondary me-3"><i class="fa-solid fa-arrow-left"></i> Hủy</a>
                    <h3 class="fw-bold text-warning mb-0">Cập nhật tài khoản</h3>
                </div>
                <hr>
                <form th:action="@{/nhan-vien/luu}" th:object="${taiKhoan}" method="POST">
                    <input type="hidden" th:field="*{maTaiKhoan}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" th:field="*{hoTen}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số điện thoại liên hệ</label>
                        <input type="text" th:field="*{soDienThoai}" class="form-control" required pattern="[0-9]{10,11}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email đăng nhập</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mật khẩu</label>
                        <input type="text" th:field="*{matKhau}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Vai trò hệ thống</label>
                        <select th:field="*{vaiTro}" class="form-select" required>
                            <option value="Nhân viên">Nhân viên</option>
                            <option value="Quản trị viên">Quản trị viên</option>
                        </select>
                    </div>
                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-warning text-dark fw-bold w-100 py-2"><i class="fa-solid fa-user-check me-2"></i>Cập nhật thông tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
